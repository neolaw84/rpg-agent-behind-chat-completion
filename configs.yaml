# Proxy configuration
# All paths are relative to the repository root.

state:
  # Number of recent turns to retain in the FIFO session store.
  num_states_to_track: 128
  # Directory where per-session JSON files are written (gitignored).
  storage_dir: "data/states"

sandbox:
  # Wall-clock timeout (seconds) for each code execution inside the sandbox.
  timeout_seconds: 12.0

langgraph:
  # Maximum LLM ↔ Tool round-trips per request before the graph is forced
  # to stop.  Set to 5 so a stuck loop cannot spin indefinitely.
  max_iterations: 5
